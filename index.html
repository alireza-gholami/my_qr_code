<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>HNV Authentifizierung</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="top-bar">
      <div class="back-btn" id="backBtn">&#10094;</div>
      <div class="menu-btn" id="menuBtn">&#8230;</div>
    </header>

    <main class="content">
      <section class="logo-row">
        <img src="data/logo.svg" alt="HNV Logo" class="main-logo" id="mainLogoImg">
        <div class="center-number" id="displayNumber">65432</div>
        <div class="blinking-timer" id="timer">02:00</div>
      </section>

      <section class="info-row">
        <div class="date-row">
          <span class="live-date" id="displayDate">01.01.2026 07:05</span>
          <div class="ticket-col">
            <span class="ticket-text" id="displayTicketTitle">Deutschland Ticket</span>
            <div class="job-text">Job</div>
          </div>
        </div>
      </section>

      <section class="animation-row">
        <img src="data/bewegungslogo.png" alt="Bewegungslogo" class="floating-logo" id="floatingLogo">
      </section>

      <section class="qr-row">
        <div class="qr-container">
          <img src="data/QR_deWP.svg.png" alt="QR Code" class="qr-image" id="displayQR">
        </div>
      </section>

      <footer class="footer-names">
        <div class="user-name" id="displayUserName">Max Mustermann</div>
        <div class="ausweis-label">Ausweis: Lichtbildausweis</div>
        <div class="ticket-title-inline" id="displayTicketTitle">Deutschland Ticket Job</div>
        <div class="validity-row">
          <div class="valid-from" id="validFrom">Gültig von: 01.06.2026 00:00</div>
          <div class="valid-until" id="validUntil">Gültig bis: 01.06.2026 03:00</div>
        </div>
      </footer>
    </main>

    <footer class="static-footer">
      <img src="data/unten.jpeg" alt="Footer Menu" class="footer-image">
    </footer>

    <div class="modal-overlay" id="settingsModal">
      <div class="modal-content">
        <h3>Einstellungen</h3>
        <form id="settingsForm">
          <label>QR-Code (JPG):</label>
          <input type="file" id="qrUpload" accept="image/jpeg, image/jpg">
          <input type="text" id="inputNumber" placeholder="Nummer">
          <input type="text" id="inputUserName" placeholder="Name">
          <input type="text" id="inputTicketTitle" placeholder="Ticket Titel">
          <label>Logo Geschwindigkeit:</label>
          <input type="range" id="speedRange" min="0.2" max="5" step="0.1" value="2">
          <label>Bewegungs-Radius:</label>
          <input type="range" id="rangeRange" min="10" max="150" step="5" value="130">
          <label>QR Code Größe:</label>
          <input type="range" id="qrRange" min="100" max="400" step="10" value="255">
          <label>Logo Größe:</label>
          <input type="range" id="logoRange" min="20" max="100" step="5" value="40">
          <button type="submit">Speichern</button>
        </form>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
