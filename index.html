<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>HNV Authentifizierung</title>
  
  <!-- PWA & iOS Meta Tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HNV Auth">
  
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="apple-touch-icon" href="data/logo.svg">
</head>
<body>

  <!-- Main Container -->
  <div class="app-container">
    
    <!-- Top Bar Navigation -->
    <header class="top-bar">
      <div class="back-btn" id="backBtn">
        <!-- Ein einfacher Pfeil nach links (<) -->
        <span class="arrow-left">&#10094;</span>
      </div>
      <div class="top-title"></div>
      <div class="menu-btn" id="menuBtn">
        <!-- Drei Punkte nebeneinander (...) -->
        <span class="ellipsis">&#8230;</span>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="content">
      
      <section class="logo-row">
        <div class="logo-wrapper">
          <img src="data/logo.svg" alt="HNV Logo" class="main-logo" id="mainLogoImg">
        </div>
        <div class="center-number" id="displayNumber">65432</div>
        <div class="logo-row-spacer"></div>
      </section>

      <div class="divider"></div>

      <section class="info-row">
        <div class="date-row">
          <span class="live-date" id="displayDate">01.01.2026 07:05</span>
          <span class="country-text">Deutschland Kollegen</span>
        </div>
        <div class="blinking-timer">2:00</div>
      </section>

      <section class="animation-row">
        <div class="floating-logo-container">
          <img src="data/bewegungslogo.png" alt="Bewegungslogo" class="floating-logo">
        </div>
      </section>

      <section class="qr-row">
        <div class="qr-container">
          <img src="data/QR_deWP.svg.png" alt="QR Code" class="qr-image" id="displayQR">
        </div>
      </section>

      <footer class="footer-names">
        <div class="user-name" id="displayUserName">Max Mustermann</div>
        <div class="colleague-name" id="displayColleagueName">Kollege Name</div>
        <!-- Neuer Textbereich als Ersatz für Einstellungen -->
        <div class="footer-note" id="footerNote">Hier steht der zusätzliche Text.</div>
      </footer>
    </main>


  </div>

  <!-- JavaScript -->
  <script src="app.js"></script>
</body>
</html>
